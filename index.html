<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study Platform</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 0;
      background: linear-gradient(-45deg, #4facfe, #00f2fe, #43e97b, #38f9d7);
      background-size: 400% 400%;
      animation: bgMove 10s ease infinite;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      margin-top: 50px;
    }

    .card {
      display: inline-block;
      padding: 15px 25px;
      margin: 10px;
      background: rgba(255,255,255,0.9);
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    .card:hover {
      transform: scale(1.08);
    }

    iframe {
      margin-top: 15px;
      display: block;
      margin-left: auto;
      margin-right: auto;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
      font-weight: bold;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .hidden {
      display: none;
    }
  </style>

</head>
<body>

<div id="home" class="container">
  <h1>Select Your Level</h1>
  <div class="card" onclick="showSSC()">SSC</div>
  <div class="card" onclick="showHSC()">HSC</div>
</div>

<div id="ssc" class="container hidden">
  <h1>SSC Chapters</h1>
  <div class="card" onclick="showLecture('ssc1')">Vector</div>
  <div class="card" onclick="showLecture('ssc2')">Chapter 1</div>
  <button onclick="goHome()">Back</button>
</div>

<div id="hsc" class="container hidden">
  <h1>HSC Chapters</h1>
  <div class="card" onclick="showLecture('hsc1')">Chapter 1</div>
  <div class="card" onclick="showLecture('hsc2')">Chapter 2</div>
  <button onclick="goHome()">Back</button>
</div>

<div id="lecture" class="container hidden">
  <h1>Lectures</h1>
  <div id="videos"></div>
  <button onclick="goBack()">Back</button>
</div>

<script>
function showSSC(){
  hideAll();
  document.getElementById('ssc').classList.remove('hidden');
}

function showHSC(){
  hideAll();
  document.getElementById('hsc').classList.remove('hidden');
}

function showLecture(chapter){
  hideAll();
  document.getElementById('lecture').classList.remove('hidden');

  let videosDiv = document.getElementById('videos');
  videosDiv.innerHTML = '';

  let links = {
    'ssc1': [
      {title: 'Lecture 1', link: 'https://www.youtube.com/embed/UvWDgqlZz-A'},
      {title: 'Lecture 2', link: 'https://www.youtube.com/embed/VV9Agqb40M4'},
      {title: 'Lecture 3', link: 'https://www.youtube.com/embed/W8eZC4QOK4A'},
      {title: 'Lecture 4', link: 'https://www.youtube.com/embed/Qm0U-vKVtSc'},
      {title: 'Lecture 5', link: 'https://www.youtube.com/embed/vI-sjvu7aCc'},
      {title: 'Lecture 6', link: 'https://www.youtube.com/embed/JuYQC1yERVg'},
      {title: 'Lecture 7', link: 'https://www.youtube.com/embed/MsdhaWTXbWw'},
      {title: 'Lecture 8', link: 'https://www.youtube.com/embed/paDFwGHzj84'}
    ],
    'ssc2': [
      {title: 'Lecture 1', link: 'https://www.youtube.com/embed/dQw4w9WgXcQknh'}
    ],
    'hsc1': [
      {title: 'Lecture 1', link: 'https://www.youtube.com/embed/tgbNymZ7vqjnkY'},
      {title: 'Lecture 2', link: 'https://www.youtube.com/embed/dQw4w9WgnjnkjXcQ'}
    ],
    'hsc2': [
      {title: 'Lecture 1', link: 'https://www.youtube.com/kknnhhembed/dQw4w9WgXcQ'}
    ]
  };

  links[chapter].forEach(video => {
    let block = `
      <div>
        <h3>${video.title}</h3>
        <iframe width="560" height="315" src="${video.link}" frameborder="0" allowfullscreen></iframe>
      </div>
    `;
    videosDiv.innerHTML += block;
  });
}

function goBack(){
  hideAll();
  document.getElementById('ssc').classList.remove('hidden');
}

function goHome(){
  hideAll();
  document.getElementById('home').classList.remove('hidden');
}

function hideAll(){
  document.getElementById('home').classList.add('hidden');
  document.getElementById('ssc').classList.add('hidden');
  document.getElementById('hsc').classList.add('hidden');
  document.getElementById('lecture').classList.add('hidden');
}
</script>

</body>
</html>
