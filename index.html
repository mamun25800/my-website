<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Study Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4facfe;
      --secondary: #00f2fe;
      --glass: rgba(255, 255, 255, 0.15);
      --yt-red: #ff0000;
    }

    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #23a6d5, #23d5ab, #ee7752, #e73c7e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 90%;
      max-width: 800px;
      padding: 30px;
      background: var(--glass);
      backdrop-filter: blur(15px);
      border-radius: 25px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      text-align: center;
      animation: zoomIn 0.5s ease;
    }

    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    h1 { font-weight: 600; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
    h2 { font-weight: 400; color: #f0f0f0; margin-bottom: 25px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      color: #333;
      padding: 20px 10px;
      border-radius: 15px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card:hover {
      transform: translateY(-5px);
      background: var(--primary);
      color: white;
    }

    .video-item {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 25px;
    }

    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      border-radius: 10px;
      overflow: hidden;
    }

    .video-container iframe {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%; border: 0;
    }

    /* Subscribe Button Style */
    .subscribe-box {
      margin-top: 30px;
      padding: 25px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      border: 1px dashed rgba(255,255,255,0.4);
    }

    .sub-btn {
      display: inline-block;
      background: var(--yt-red);
      color: white;
      padding: 12px 30px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 10px;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
    }

    .sub-btn:hover {
      transform: scale(1.05);
      background: #cc0000;
      box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5);
    }

    button.back-btn {
      margin-top: 25px;
      padding: 10px 25px;
      border: none;
      border-radius: 20px;
      background: #fff;
      color: #333;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button.back-btn:hover { background: #ddd; transform: scale(1.05); }

    .hidden { display: none; }
  </style>
</head>
<body>

<div class="container">
  
  <div id="view-levels">
    <h1>Study Platform</h1>
    <h2>Select Your Level</h2>
    <div class="grid">
      <div class="card" onclick="showSubjects('ssc')">SSC</div>
      <div class="card" onclick="showSubjects('hsc')">HSC</div>
    </div>
  </div>

  <div id="view-subjects" class="hidden">
    <h1 id="subject-title">Subjects</h1>
    <div id="subject-list" class="grid"></div>
    <button class="back-btn" onclick="navigateTo('view-levels')">← Back</button>
  </div>

  <div id="view-chapters" class="hidden">
    <h1 id="chapter-title">Chapters</h1>
    <div id="chapter-list" class="grid"></div>
    <button class="back-btn" onclick="navigateTo('view-subjects')">← Back</button>
  </div>

  <div id="view-lectures" class="hidden">
    <h1 id="lecture-header">Lectures</h1>
    <div id="lecture-list"></div>
    <button class="back-btn" onclick="navigateTo('view-chapters')">← Back</button>
  </div>

</div>

<script>
  let selectedLevel = "";
  let selectedSubject = "";

  const data = {
    ssc: {
      "General Math": ["Chapter 1", "Chapter 2"],
      "Higher Math": ["Vector", "Coordinate Geometry"],
      "Physics": ["Motion", "Force"],
      "Chemistry": ["Structure of Matter"]
    },
    hsc: {
      "Math": ["Matrix", "Calculus"],
      "Physics": ["Vector", "Dynamics"],
      "Chemistry": ["Organic Chemistry"],
      "ICT": ["Programming", "HTML"]
    }
  };

  const videoLinks = {
    "Vector": [
      {title: 'Lecture 1', link: 'https://www.youtube.com/embed/UvWDgqlZz-A'},
      {title: 'Lecture 2', link: 'https://www.youtube.com/embed/VV9Agqb40M4'},
      {title: 'Lecture 3', link: 'https://www.youtube.com/embed/W8eZC4QOK4A'},
      {title: 'Lecture 4', link: 'https://www.youtube.com/embed/Qm0U-vKVtSc'},
      {title: 'Lecture 5', link: 'https://www.youtube.com/embed/vI-sjvu7aCc'},
      {title: 'Lecture 6', link: 'https://www.youtube.com/embed/JuYQC1yERVg'},
      {title: 'Lecture 7', link: 'https://www.youtube.com/embed/MsdhaWTXbWw'},
      {title: 'Lecture 8', link: 'https://www.youtube.com/embed/paDFwGHzj84'}
    ]
  };

  function navigateTo(viewId) {
    document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
    document.getElementById(viewId).classList.remove('hidden');
  }

  function showSubjects(level) {
    selectedLevel = level;
    const list = document.getElementById('subject-list');
    list.innerHTML = "";
    document.getElementById('subject-title').innerText = level.toUpperCase() + " Subjects";
    
    Object.keys(data[level]).forEach(subject => {
      list.innerHTML += `<div class="card" onclick="showChapters('${subject}')">${subject}</div>`;
    });
    navigateTo('view-subjects');
  }

  function showChapters(subject) {
    selectedSubject = subject;
    const list = document.getElementById('chapter-list');
    list.innerHTML = "";
    document.getElementById('chapter-title').innerText = subject;

    data[selectedLevel][subject].forEach(chapter => {
      list.innerHTML += `<div class="card" onclick="showLectures('${chapter}')">${chapter}</div>`;
    });
    navigateTo('view-chapters');
  }

  function showLectures(chapter) {
    const list = document.getElementById('lecture-list');
    list.innerHTML = "";
    document.getElementById('lecture-header').innerText = chapter + " Lectures";

    if (videoLinks[chapter]) {
      videoLinks[chapter].forEach(vid => {
        list.innerHTML += `
          <div class="video-item">
            <h3>${vid.title}</h3>
            <div class="video-container">
              <iframe src="${vid.link}" allowfullscreen></iframe>
            </div>
          </div>`;
      });

      // ইউটিউব সাবস্ক্রাইব বাটন যোগ করা হয়েছে
      list.innerHTML += `
        <div class="subscribe-box">
          <h3>Enjoying our classes?</h3>
          <p>নতুন সব ভিডিও সবার আগে পেতে আমাদের ইউটিউব চ্যানেলটি সাবস্ক্রাইব করো!</p>
          <a href="https://www.youtube.com/@sohojeshikhi13" target="_blank" class="sub-btn">
            SUBSCRIBE NOW
          </a>
        </div>
      `;
    } else {
      list.innerHTML = "<p>Coming Soon! This chapter is not yet updated.</p>";
    }
    navigateTo('view-lectures');
  }
</script>

</body>
</html>
